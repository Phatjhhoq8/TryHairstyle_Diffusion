services:
  redis:
    image: redis:7-alpine
    container_name: tryhairstyle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tryhairstyle-backend
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./backend/training:/app/backend/training
    gpus: all
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tryhairstyle-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./backend/training:/app/backend/training
    gpus: all
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --pool=solo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tryhairstyle-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
